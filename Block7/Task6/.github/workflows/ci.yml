name: Task pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer
      
      - name: Lint PHP
        run: |
          php -l index.php
          find server -name "*.php" -exec php -l {} \;

  tests:
    runs-on: ubuntu-latest
    needs: lint
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: task4
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'

      - name: Install dependencies
        run: composer install --no-progress --no-suggest --prefer-dist
      
      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y mysql-client
        
      - name: Wait for MySQL ready
        run: |
          until mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; do 
            echo "Waiting for MySQL" 
            sleep 5
          done
      - name: Migrations
        run: |
          mysql -h 127.0.0.1 -uroot -proot task6 < migrate.sql
      - name: Copy environment
        run: |
          if [ -f .env example ]; then
            cp .env.example .env
          elif [ -f .env.testing ]; then
            cp .env.testing .env
          fi
      - name: Generate app key
        run: |
          if [ -f artisan ]; then
            php artisan key:generate
          fi
      - name: Run PHPUnit
        run: |
          if [ -f phpunit.xml ] || [ -f phpunit.xml.dist ]; then
            ./vendor/bin/phpunit --colors=always
          fi

  build:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
      
      - name: Build docker image
        run: docker build -t task6-app .
      
      - name: Save image
        run: docker save task6-app -o task6-app.tar
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: task6-app-image
          path: task6-app.tar