name: Task pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'    # или '8.5.4'
          tools: composer
      
      - name: Lint PHP
        run: |
          php -l index.php
          find server -name "*.php" -exec php -l {} \;

  tests:
    runs-on: ubuntu-latest
    needs: lint
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: task4
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
      
      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y mysql-client
      
      - name: Migrations
        run: |
          mysql -h 127.0.0.1 -uroot -proot task4 < migrate.sql

  build:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
      
      - name: Build docker image
        run: docker build -t task4-app .
      
      - name: Save image
        run: docker save task4-app -o task4-app.tar
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: task4-app-image
          path: task4-app.tar